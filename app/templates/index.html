{% extends "base.html" %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3">
    <h1>Welcome to Smieciarka!</h1>
    <p>Here someones garbage becomes your treasures.</p>
    <button class="btn btn-primary btn-lg">Place an offer.</button>
</div>

<div>
    <ul>
        {% for offer in offers %}
        <div class="col">
            {% include "partials/_offer_card.html" %}
        </div>
        {% else %}
        <div class="col-12 text-center">
            <p class="lead">No offers found. Be the first to add something!</p>
        </div>
        {% endfor %}
    </ul>
</div>
{% endblock %}
